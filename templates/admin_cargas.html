<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Cargas — Importal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css">
  <script src="/static/js/api.js"></script>
  <script src="/static/js/admin_layout.js"></script>
  <style>[x-cloak]{display:none!important} .gradient-card{background:linear-gradient(135deg,#1a6bbf 0%,#0f4a8a 100%);}</style>
</head>
<body x-data="adminCargasApp()" x-init="init()" class="font-[Inter] bg-gray-50 min-h-screen">

<aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'"
  class="fixed inset-y-0 left-0 z-40 w-60 bg-gray-900 flex flex-col" style="transition:transform .25s ease">
  <div class="h-16 flex items-center px-5 border-b border-gray-700">
    <div class="w-8 h-8 rounded-lg gradient-card flex items-center justify-center mr-2"><span class="text-white font-bold text-sm">IM</span></div>
    <div><div class="font-bold text-white text-sm">Importal</div><div class="text-gray-400 text-xs">Panel Admin</div></div>
  </div>
  <nav class="flex-1 p-3 space-y-1">
    <template x-for="n in nav" :key="n.key">
      <a :href="n.href" :class="page===n.key ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800 hover:text-white'"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors">
        <span x-text="n.icon"></span><span x-text="n.label"></span>
      </a>
    </template>
  </nav>
  <div class="p-4 border-t border-gray-700">
    <button @click="logout()" class="text-xs text-gray-500 hover:text-red-400 px-1">Cerrar sesión →</button>
  </div>
</aside>
<div x-show="sidebarOpen" @click="sidebarOpen=false" class="fixed inset-0 z-30 bg-black/50 md:hidden" x-cloak></div>

<div class="md:ml-60 min-h-screen">
  <header class="h-16 bg-white border-b border-gray-200 flex items-center px-4 md:px-6 gap-4 sticky top-0 z-20">
    <button @click="sidebarOpen=!sidebarOpen" class="md:hidden text-gray-500 text-xl">☰</button>
    <h1 class="font-bold text-gray-900 flex-1">Gestión de Cargas</h1>
    <button @click="openCreate()" class="btn btn-primary text-sm">+ Nueva carga</button>
  </header>

  <main class="p-4 md:p-6 max-w-6xl mx-auto">
    <div x-show="loading" class="loading">Cargando…</div>
    <div x-show="!loading" class="card overflow-x-auto">
      <table>
        <thead><tr>
          <th>Código</th><th>Tipo</th><th class="hide-mobile">Tasa USD</th><th class="hide-mobile">Apertura</th><th>Estado</th><th>Tracking</th><th>Acción</th>
        </tr></thead>
        <tbody>
          <template x-for="c in cargas" :key="c.id">
            <tr>
              <td class="font-bold text-gray-900" x-text="c.code"></td>
              <td><span class="badge bg-gray-100 text-gray-700" x-text="c.type"></span></td>
              <td class="hide-mobile text-sm" x-text="'$'+c.dollar_rate"></td>
              <td class="hide-mobile text-xs text-gray-400" x-text="API.fmt.date(c.open_date)"></td>
              <td><span :class="'badge '+(API.fmt.status[c.status]?.cls||'badge-open')" x-text="API.fmt.status[c.status]?.label||c.status"></span></td>
              <td><button @click="openTracking(c)" class="text-blue-600 text-xs hover:underline">+ Etapa</button></td>
              <td>
                <div class="flex gap-1">
                  <button @click="openEdit(c)" class="btn text-xs bg-gray-100 text-gray-700 hover:bg-gray-200">Editar</button>
                  <button @click="closeCarga(c)" x-show="c.status!=='CLOSED'" class="btn text-xs btn-danger">Cerrar</button>
                </div>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
      <div x-show="cargas.length===0" class="empty-state">
        <div class="icon">📦</div><div>Sin cargas registradas</div>
      </div>
    </div>
  </main>
</div>

<!-- Modal: Crear/Editar carga -->
<div x-show="modal==='carga'" x-cloak class="modal-overlay show" @click.self="modal=null">
  <div class="modal w-full max-w-md mx-4">
    <button @click="modal=null" class="absolute top-4 right-4 text-gray-400 text-xl">✕</button>
    <h2 class="text-xl font-bold mb-4" x-text="editId ? 'Editar carga' : 'Nueva carga'"></h2>
    <div x-show="formMsg" class="alert alert-success mb-4"><span>✅</span><span x-text="formMsg"></span></div>
    <form @submit.prevent="saveCarga()">
      <div class="form-group">
        <label>Código de carga *</label>
        <input type="text" x-model="form.code" placeholder="MAR26-1" required :disabled="!!editId" :class="editId?'bg-gray-50':''">
      </div>
      <div class="form-group">
        <label>Tipo *</label>
        <select x-model="form.type" required>
          <option value="AEREA">Aérea</option>
          <option value="MARITIMA">Marítima</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tasa del dólar (CLP)</label>
        <input type="number" x-model="form.dollar_rate" step="0.01" placeholder="960">
      </div>
      <div class="form-group">
        <label>Fecha apertura</label>
        <input type="date" x-model="form.open_date">
      </div>
      <div x-show="editId" class="form-group">
        <label>Estado</label>
        <select x-model="form.status">
          <option value="OPEN">Abierta</option>
          <option value="IN_TRANSIT">En tránsito</option>
          <option value="CLOSED">Cerrada</option>
        </select>
      </div>
      <div class="form-group">
        <label>Notas internas</label>
        <textarea x-model="form.notes" rows="2" placeholder="Observaciones…"></textarea>
      </div>
      <button type="submit" :disabled="saving" class="btn btn-primary w-full btn-lg justify-center" :class="{'opacity-60':saving}">
        <span x-text="saving ? 'Guardando…' : (editId ? 'Guardar cambios' : 'Crear carga')"></span>
      </button>
    </form>
  </div>
</div>

<!-- Modal: Agregar etapa tracking -->
<div x-show="modal==='tracking'" x-cloak class="modal-overlay show" @click.self="modal=null">
  <div class="modal w-full max-w-md mx-4">
    <button @click="modal=null" class="absolute top-4 right-4 text-gray-400 text-xl">✕</button>
    <h2 class="text-xl font-bold mb-2">Agregar etapa de tracking</h2>
    <p class="text-sm text-gray-500 mb-4">Carga: <strong x-text="trackCarga?.code"></strong></p>
    <div x-show="trackMsg" class="alert alert-success mb-4"><span>✅</span><span x-text="trackMsg"></span></div>
    <form @submit.prevent="saveTracking()">
      <div class="form-group">
        <label>Etapa *</label>
        <select x-model="trackForm.stage" required>
          <option value="ORDERED">Orden confirmada</option>
          <option value="PURCHASED">Compra realizada USA</option>
          <option value="IN_WAREHOUSE_US">En bodega USA (Miami)</option>
          <option value="IN_FLIGHT">En vuelo a Chile</option>
          <option value="IN_CUSTOMS">En aduana chilena</option>
          <option value="IN_WAREHOUSE_CL">En bodega Chile</option>
          <option value="DISPATCHED">Despachado por courier</option>
          <option value="DELIVERED">Entregado</option>
        </select>
      </div>
      <div class="form-group">
        <label>Fecha/hora del evento</label>
        <input type="datetime-local" x-model="trackForm.stage_date">
      </div>
      <div class="form-group">
        <label>Notas</label>
        <input type="text" x-model="trackForm.notes" placeholder="Observación…">
      </div>
      <button type="submit" :disabled="trackSaving" class="btn btn-primary w-full btn-lg justify-center">
        <span x-text="trackSaving ? 'Guardando…' : 'Guardar etapa'"></span>
      </button>
    </form>
  </div>
</div>

<script>
function adminCargasApp() {
  return {
    ...adminLayout('admin_cargas'),
    cargas: [], loading: true,
    modal: null,
    editId: null,
    form: { code:'', type:'AEREA', dollar_rate:960, open_date:'', status:'OPEN', notes:'' },
    formMsg: '', saving: false,
    trackCarga: null,
    trackForm: { stage:'ORDERED', stage_date:'', notes:'' },
    trackMsg: '', trackSaving: false,

    openCreate() {
      this.editId = null;
      this.form = { code:'', type:'AEREA', dollar_rate:960, open_date:new Date().toISOString().slice(0,10), status:'OPEN', notes:'' };
      this.formMsg = ''; this.modal = 'carga';
    },
    openEdit(c) {
      this.editId = c.id;
      this.form = { code:c.code, type:c.type, dollar_rate:c.dollar_rate, open_date:c.open_date, status:c.status, notes:c.notes||'' };
      this.formMsg = ''; this.modal = 'carga';
    },
    openTracking(c) {
      this.trackCarga = c;
      this.trackForm = { stage:'ORDERED', stage_date: new Date().toISOString().slice(0,16), notes:'' };
      this.trackMsg = ''; this.modal = 'tracking';
    },

    async closeCarga(c) {
      if (!confirm(`¿Cerrar la carga ${c.code}?`)) return;
      await API.post('/api/admin/cargas/update', { id: c.id, status: 'CLOSED' });
      c.status = 'CLOSED';
    },

    async saveCarga() {
      this.saving = true;
      if (this.editId) {
        await API.post('/api/admin/cargas/update', { id: this.editId, ...this.form });
        const idx = this.cargas.findIndex(c => c.id === this.editId);
        if (idx >= 0) this.cargas[idx] = { ...this.cargas[idx], ...this.form };
      } else {
        const r = await API.post('/api/admin/cargas', this.form);
        if (r.ok) {
          this.cargas.unshift({ id: r.data.id, ...this.form });
        }
      }
      this.formMsg = 'Guardado correctamente.';
      setTimeout(() => { this.formMsg=''; this.modal=null; }, 1500);
      this.saving = false;
    },

    async saveTracking() {
      this.trackSaving = true;
      await API.post('/api/admin/tracking', {
        carga_id: this.trackCarga.id,
        stage: this.trackForm.stage,
        stage_date: this.trackForm.stage_date,
        notes: this.trackForm.notes,
      });
      this.trackMsg = 'Etapa guardada.';
      // Update carga status
      const stageToStatus = {
        'IN_FLIGHT':'IN_TRANSIT','IN_CUSTOMS':'IN_TRANSIT',
        'IN_WAREHOUSE_CL':'IN_TRANSIT','DISPATCHED':'IN_TRANSIT','DELIVERED':'CLOSED'
      };
      const newStatus = stageToStatus[this.trackForm.stage];
      if (newStatus) {
        const c = this.cargas.find(x=>x.id===this.trackCarga.id);
        if (c) {
          c.status = newStatus;
          await API.post('/api/admin/cargas/update', { id: c.id, status: newStatus });
        }
      }
      setTimeout(() => { this.trackMsg=''; this.modal=null; }, 1500);
      this.trackSaving = false;
    },

    async init() {
      await adminLayout('admin_cargas').init.call(this);
      this.cargas = await API.get('/api/admin/cargas') || [];
      this.loading = false;
    }
  }
}
</script>
</body>
</html>
