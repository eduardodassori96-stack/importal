<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Cargas — Importal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css">
  <script src="/static/js/api.js"></script>
  <script src="/static/js/layout.js"></script>
  <style>[x-cloak]{display:none!important} .gradient-card{background:linear-gradient(135deg,#1a6bbf 0%,#0f4a8a 100%);}</style>
</head>
<body x-data="cargasApp()" x-init="init()" class="font-[Inter] bg-gray-50 min-h-screen">

<aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'"
  class="fixed inset-y-0 left-0 z-40 w-60 bg-white border-r border-gray-200 flex flex-col" style="transition:transform .25s ease">
  <div class="h-16 flex items-center px-5 border-b border-gray-100">
    <div class="w-8 h-8 rounded-lg gradient-card flex items-center justify-center mr-2"><span class="text-white font-bold text-sm">IM</span></div>
    <span class="font-bold text-gray-900">Importal</span>
  </div>
  <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
    <template x-for="n in nav" :key="n.key">
      <a :href="n.href" :class="page===n.key ? 'bg-blue-50 text-blue-700 font-semibold' : 'text-gray-600 hover:bg-gray-50'"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-colors">
        <span x-text="n.icon"></span><span x-text="n.label"></span>
      </a>
    </template>
  </nav>
  <div class="p-4 border-t border-gray-100">
    <div class="flex items-center gap-3 mb-3">
      <div class="w-9 h-9 rounded-full gradient-card flex items-center justify-center text-white font-bold text-sm" x-text="user?.name?.[0]?.toUpperCase()||'?'"></div>
      <div class="min-w-0">
        <div class="text-sm font-semibold text-gray-900 truncate" x-text="user?.name||'...'"></div>
        <div class="text-xs text-gray-400 truncate" x-text="user?.email||''"></div>
      </div>
    </div>
    <button @click="logout()" class="w-full text-left text-xs text-gray-400 hover:text-red-500 transition-colors px-1">Cerrar sesión →</button>
  </div>
</aside>

<div x-show="sidebarOpen" @click="sidebarOpen=false" class="fixed inset-0 z-30 bg-black/30 md:hidden" x-cloak></div>

<div class="md:ml-60 min-h-screen">
  <header class="h-16 bg-white border-b border-gray-200 flex items-center px-4 md:px-6 gap-4 sticky top-0 z-20">
    <button @click="sidebarOpen=!sidebarOpen" class="md:hidden text-gray-500 text-xl">☰</button>
    <h1 class="font-bold text-gray-900 flex-1">Mis Cargas</h1>
  </header>

  <main class="p-4 md:p-6 max-w-5xl mx-auto">
    <div x-show="loading" class="loading">Cargando cargas…</div>
    <div x-show="!loading && cargas.length===0" class="empty-state">
      <div class="icon">📦</div>
      <div class="font-medium">No tienes cargas registradas</div>
      <div class="text-sm mt-1">Contáctanos para iniciar tu primera importación</div>
    </div>

    <div x-show="!loading && cargas.length>0" class="space-y-5">
      <template x-for="carga in cargas" :key="carga.id">
        <div class="card">
          <!-- Header -->
          <div class="flex items-start justify-between gap-4 mb-4">
            <div>
              <div class="flex items-center gap-2 flex-wrap">
                <h2 class="font-bold text-gray-900 text-lg" x-text="carga.code"></h2>
                <span :class="'badge ' + (API.fmt.status[carga.status]?.cls||'badge-pending')" x-text="API.fmt.status[carga.status]?.label||carga.status"></span>
                <span class="badge bg-gray-100 text-gray-600" x-text="carga.type"></span>
              </div>
              <div class="text-xs text-gray-400 mt-1" x-text="'Apertura: ' + API.fmt.date(carga.open_date)"></div>
            </div>
            <a :href="'/dashboard/tracking?carga='+carga.id" class="btn btn-primary text-sm flex-shrink-0">🗺️ Tracking</a>
          </div>

          <!-- Cobros de esta carga -->
          <div x-show="carga.cobros?.length > 0">
            <div class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Cobros</div>
            <div class="overflow-x-auto">
              <table>
                <thead><tr>
                  <th>Código único</th><th>Concepto</th><th>Monto</th><th class="hide-mobile">Mora</th><th class="hide-mobile">Vence</th><th>Estado</th>
                </tr></thead>
                <tbody>
                  <template x-for="cb in carga.cobros" :key="cb.id">
                    <tr>
                      <td class="font-mono text-xs text-blue-700 font-semibold" x-text="cb.unique_code"></td>
                      <td class="text-xs text-gray-600" x-text="cb.type"></td>
                      <td class="font-semibold" x-text="API.fmt.clp(cb.amount_clp)"></td>
                      <td class="hide-mobile text-red-600 text-sm" x-text="cb.mora_amount>0 ? '+'+API.fmt.clp(cb.mora_amount) : '—'"></td>
                      <td class="hide-mobile text-xs text-gray-400" x-text="API.fmt.date(cb.due_date)"></td>
                      <td><span :class="'badge '+(API.fmt.status[cb.status]?.cls||'badge-pending')" x-text="API.fmt.status[cb.status]?.label||cb.status"></span></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>

          <div x-show="carga.notes" class="mt-3 text-xs text-gray-400 italic" x-text="'📝 ' + carga.notes"></div>
        </div>
      </template>
    </div>
  </main>
</div>

<script>
function cargasApp() {
  return {
    ...layoutApp('cargas'),
    cargas: [],
    loading: true,
    async init() {
      await layoutApp('cargas').init.call(this);
      const [cargas, cobros] = await Promise.all([
        API.get('/api/cargas'),
        API.get('/api/cobros'),
      ]);
      // Attach cobros to each carga
      const all = cargas || [];
      const cobs = cobros || [];
      this.cargas = all.map(c => ({
        ...c,
        cobros: cobs.filter(cb => cb.carga_id === c.id)
      }));
      this.loading = false;
    }
  }
}
</script>
</body>
</html>
