<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Clientes — Importal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css">
  <script src="/static/js/api.js"></script>
  <script src="/static/js/admin_layout.js"></script>
  <style>[x-cloak]{display:none!important} .gradient-card{background:linear-gradient(135deg,#1a6bbf 0%,#0f4a8a 100%);}</style>
</head>
<body x-data="adminClientesApp()" x-init="init()" class="font-[Inter] bg-gray-50 min-h-screen">

<aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'"
  class="fixed inset-y-0 left-0 z-40 w-60 bg-gray-900 flex flex-col" style="transition:transform .25s ease">
  <div class="h-16 flex items-center px-5 border-b border-gray-700">
    <div class="w-8 h-8 rounded-lg gradient-card flex items-center justify-center mr-2"><span class="text-white font-bold text-sm">IM</span></div>
    <div><div class="font-bold text-white text-sm">Importal</div><div class="text-gray-400 text-xs">Panel Admin</div></div>
  </div>
  <nav class="flex-1 p-3 space-y-1">
    <template x-for="n in nav" :key="n.key">
      <a :href="n.href" :class="page===n.key ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-gray-800 hover:text-white'"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors">
        <span x-text="n.icon"></span><span x-text="n.label"></span>
      </a>
    </template>
  </nav>
  <div class="p-4 border-t border-gray-700">
    <button @click="logout()" class="text-xs text-gray-500 hover:text-red-400 px-1">Cerrar sesión →</button>
  </div>
</aside>
<div x-show="sidebarOpen" @click="sidebarOpen=false" class="fixed inset-0 z-30 bg-black/50 md:hidden" x-cloak></div>

<div class="md:ml-60 min-h-screen">
  <header class="h-16 bg-white border-b border-gray-200 flex items-center px-4 md:px-6 gap-4 sticky top-0 z-20">
    <button @click="sidebarOpen=!sidebarOpen" class="md:hidden text-gray-500 text-xl">☰</button>
    <h1 class="font-bold text-gray-900 flex-1">Clientes</h1>
    <input type="text" x-model="search" placeholder="Buscar nombre o email…" class="text-sm border border-gray-200 rounded-xl px-3 py-2 bg-white w-52 focus:outline-none focus:border-blue-400">
  </header>

  <main class="p-4 md:p-6 max-w-6xl mx-auto">
    <div x-show="loading" class="loading">Cargando…</div>

    <!-- Stats top -->
    <div x-show="!loading" class="grid grid-cols-3 gap-4 mb-6">
      <div class="card text-center">
        <div class="text-3xl font-extrabold text-gray-900" x-text="clientes.length"></div>
        <div class="text-xs text-gray-500 mt-1">Total clientes</div>
      </div>
      <div class="card text-center">
        <div class="text-3xl font-extrabold text-red-600" x-text="moraCount"></div>
        <div class="text-xs text-gray-500 mt-1">En mora</div>
      </div>
      <div class="card text-center">
        <div class="text-3xl font-extrabold text-green-600" x-text="clientes.length - moraCount"></div>
        <div class="text-xs text-gray-500 mt-1">Al día</div>
      </div>
    </div>

    <div x-show="!loading" class="card overflow-x-auto">
      <table>
        <thead><tr>
          <th>Cliente</th><th class="hide-mobile">Email</th><th class="hide-mobile">RUT</th>
          <th>Deuda</th><th>Estado mora</th><th class="hide-mobile">Cargas</th><th>Acción</th>
        </tr></thead>
        <tbody>
          <template x-for="c in filteredClientes" :key="c.id">
            <tr :class="c.mora_status && c.mora_status!=='NONE' ? 'bg-red-50/50' : ''">
              <td>
                <div class="font-semibold text-gray-900 text-sm" x-text="c.name"></div>
                <div class="text-xs text-gray-400" x-text="c.company||''"></div>
              </td>
              <td class="hide-mobile text-xs text-gray-500" x-text="c.email"></td>
              <td class="hide-mobile text-xs text-gray-400" x-text="c.rut||'—'"></td>
              <td :class="c.total_deuda>0?'text-red-700 font-bold':'text-gray-400'" class="text-sm" x-text="c.total_deuda>0?API.fmt.clp(c.total_deuda):'—'"></td>
              <td>
                <template x-if="!c.mora_status || c.mora_status==='NONE'">
                  <span class="badge badge-paid">Al día</span>
                </template>
                <template x-if="c.mora_status === 'MORA_1'">
                  <span class="badge badge-overdue">Mora 5%</span>
                </template>
                <template x-if="c.mora_status === 'MORA_2'">
                  <span class="badge badge-overdue" style="background:#f8d7da">Mora 10%</span>
                </template>
                <template x-if="c.mora_status === 'SUSPENDED'">
                  <span class="badge" style="background:#343a40;color:#fff">Suspendido</span>
                </template>
              </td>
              <td class="hide-mobile text-sm text-center" x-text="c.total_cargas||0"></td>
              <td>
                <button @click="openDetail(c)" class="btn text-xs bg-gray-100 text-gray-700 hover:bg-gray-200">Ver detalle</button>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
      <div x-show="filteredClientes.length===0" class="empty-state py-4">Sin clientes</div>
    </div>
  </main>
</div>

<!-- Modal detalle cliente -->
<div x-show="modal" x-cloak class="modal-overlay show" @click.self="modal=false">
  <div class="modal w-full max-w-lg mx-4" x-show="selected">
    <button @click="modal=false" class="absolute top-4 right-4 text-gray-400 text-xl">✕</button>
    <div class="flex items-center gap-3 mb-5">
      <div class="w-12 h-12 rounded-2xl gradient-card flex items-center justify-center text-white font-bold text-lg" x-text="selected?.name?.[0]?.toUpperCase()"></div>
      <div>
        <h2 class="font-bold text-gray-900 text-lg" x-text="selected?.name"></h2>
        <div class="text-sm text-gray-400" x-text="selected?.email"></div>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-3 text-sm mb-4">
      <div class="bg-gray-50 rounded-xl p-3">
        <div class="text-xs text-gray-400 mb-0.5">RUT</div>
        <div class="font-semibold" x-text="selected?.rut||'—'"></div>
      </div>
      <div class="bg-gray-50 rounded-xl p-3">
        <div class="text-xs text-gray-400 mb-0.5">Teléfono</div>
        <div class="font-semibold" x-text="selected?.phone||'—'"></div>
      </div>
      <div class="bg-gray-50 rounded-xl p-3">
        <div class="text-xs text-gray-400 mb-0.5">Empresa</div>
        <div class="font-semibold" x-text="selected?.company||'—'"></div>
      </div>
      <div class="bg-gray-50 rounded-xl p-3">
        <div class="text-xs text-gray-400 mb-0.5">Deuda pendiente</div>
        <div :class="selected?.total_deuda>0?'font-bold text-red-600':'text-gray-900'" x-text="API.fmt.clp(selected?.total_deuda)"></div>
      </div>
    </div>
    <div class="bg-gray-50 rounded-xl p-3 text-sm">
      <div class="text-xs text-gray-400 mb-1">Estado mora</div>
      <div x-text="selected?.mora_status==='NONE'||!selected?.mora_status ? '✅ Al día' : '⚠️ ' + selected?.mora_status"></div>
    </div>
    <div class="mt-4 text-xs text-gray-400 text-center">
      Miembro desde <span x-text="API.fmt.date(selected?.created_at)"></span>
    </div>
  </div>
</div>

<script>
function adminClientesApp() {
  return {
    ...adminLayout('admin_clientes'),
    clientes: [], loading: true,
    search: '',
    modal: false, selected: null,

    get filteredClientes() {
      const q = this.search.toLowerCase();
      return !q ? this.clientes : this.clientes.filter(c =>
        (c.name||'').toLowerCase().includes(q) || (c.email||'').toLowerCase().includes(q)
      );
    },
    get moraCount() {
      return this.clientes.filter(c => c.mora_status && c.mora_status !== 'NONE').length;
    },

    openDetail(c) { this.selected = c; this.modal = true; },

    async init() {
      await adminLayout('admin_clientes').init.call(this);
      this.clientes = await API.get('/api/admin/clientes') || [];
      this.loading = false;
    }
  }
}
</script>
</body>
</html>
